installed:
- levelup
- team-ai-directives
settings:
  auto_execute_hooks: true
hooks:
  before_constitution:
  - extension: team-ai-directives
    command: team.constitution
    enabled: true
    optional: false
    priority: 10
    prompt: Execute adlc.team-ai-directives.constitution?
    description: Discover and inherit team constitution principles before project
      constitution update
    condition: null
  before_specify:
  - extension: team-ai-directives
    command: team.discover
    enabled: true
    optional: false
    priority: 10
    prompt: Execute adlc.team-ai-directives.discover?
    description: Auto-discover personas, rules, and examples from team-ai-directives
    condition: null
  before_plan:
  - extension: team-ai-directives
    command: team.discover
    enabled: true
    optional: false
    priority: 10
    prompt: Execute adlc.team-ai-directives.discover?
    description: Auto-discover architecture patterns and implementation guidelines
    condition: null
  before_implement:
  - extension: team-ai-directives
    command: team.discover
    enabled: true
    optional: false
    priority: 10
    prompt: Execute adlc.team-ai-directives.discover?
    description: Auto-discover team context before quick task execution (no-write
      mode)
    condition: null
